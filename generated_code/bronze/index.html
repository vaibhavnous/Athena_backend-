<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bronze Scripts Viewer</title>
  <style>
    :root {
      --bg: #f5efe6;
      --panel: #fffaf3;
      --ink: #1f2937;
      --muted: #6b7280;
      --line: #e7dccb;
      --accent: #0f766e;
      --accent-soft: #dff5f2;
      --shadow: 0 18px 45px rgba(31, 41, 55, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(15, 118, 110, 0.12), transparent 28%),
        linear-gradient(180deg, #fbf6ee 0%, var(--bg) 100%);
      min-height: 100vh;
    }
    .shell {
      width: min(1100px, calc(100vw - 32px));
      margin: 32px auto;
      background: rgba(255, 250, 243, 0.9);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .hero {
      padding: 28px 32px 20px;
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(135deg, rgba(15, 118, 110, 0.08), rgba(255, 250, 243, 0.92)),
        repeating-linear-gradient(135deg, transparent 0, transparent 14px, rgba(231, 220, 203, 0.3) 14px, rgba(231, 220, 203, 0.3) 15px);
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 3vw, 40px);
      letter-spacing: -0.04em;
    }
    .sub {
      color: var(--muted);
      margin: 0;
      max-width: 760px;
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
    }
    .pill {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
    }
    .toolbar {
      display: grid;
      grid-template-columns: 1fr 180px;
      gap: 14px;
      padding: 20px 32px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.45);
    }
    input, select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fffdf9;
      color: var(--ink);
      font: inherit;
      outline: none;
    }
    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.12);
    }
    .list {
      padding: 24px 32px 32px;
      display: grid;
      gap: 16px;
    }
    .card {
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
      display: grid;
      gap: 10px;
    }
    .row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: start;
      flex-wrap: wrap;
    }
    .source {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .target {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }
    .tag {
      background: var(--accent-soft);
      color: var(--accent);
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .empty {
      display: none;
      padding: 8px 32px 32px;
      color: var(--muted);
    }
    @media (max-width: 720px) {
      .shell { width: min(100vw - 16px, 1100px); margin: 8px auto; border-radius: 18px; }
      .hero, .toolbar, .list { padding-left: 18px; padding-right: 18px; }
      .toolbar { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <h1>Bronze Scripts Viewer</h1>
      <p class="sub">A simple HTML page for reading generated bronze ingestion scripts in one place. Search by source table, target table, or script name.</p>
      <div class="meta">
        <span class="pill">Generated at: 2026-05-12T10:20:51.143068</span>
        <span class="pill">Scripts: 1</span>
        <span class="pill">Target schema: main.bronze</span>
      </div>
    </section>

    <section class="toolbar">
      <input id="search" type="search" placeholder="Search claim, policy, bronze_, dbo..." />
      <select id="status">
        <option value="">All statuses</option>
        <option value="APPROVED">APPROVED</option>
      </select>
    </section>

    <section id="list" class="list"></section>
    <p id="empty" class="empty">No bronze scripts match the current filter.</p>
  </main>

  <script>
    const rows = [{"source": "Vendor SFTP./daily/transactions/.transaction", "target": "main.bronze.bronze_transaction", "script_name": "bronze_ingest_sftp_transaction.py", "script_path": "C:\\Users\\vaibhavmalik\\Athena_backend\\generated_code\\bronze\\bronze_ingest_sftp_transaction.py", "script_body": "\n\"\"\"\nAUTO-GENERATED BRONZE INGESTION SCRIPT\n\nSource: Vendor SFTP\nFolder: /daily/transactions/\nFile pattern: TXN_YYYYMMDD.csv\nExpected runtime: Spark / Databricks with Delta support and paramiko installed\nTarget table: main.bronze.bronze_transaction\n\nDO NOT EDIT MANUALLY\n\"\"\"\n\nimport hashlib\nimport os\nfrom pathlib import Path\n\nimport paramiko\nfrom pyspark.sql import SparkSession\nfrom pyspark.sql.functions import current_timestamp, input_file_name, lit\n\nspark = SparkSession.builder.getOrCreate()\n\ntry:\n    spark.sql(\"CREATE SCHEMA IF NOT EXISTS bronze\")\nexcept Exception:\n    print(\"Could not create schema 'bronze' in the current catalog\")\n\nRUN_ID = os.getenv(\"ATHENA_RUN_ID\", \"BRONZE_POC_RUN_001\")\nSFTP_HOST = os.environ[\"SFTP_HOST\"]\nSFTP_PORT = int(os.getenv(\"SFTP_PORT\", \"22\"))\nSFTP_USERNAME = os.environ[\"SFTP_USERNAME\"]\nSFTP_PASSWORD = os.getenv(\"SFTP_PASSWORD\")\nSFTP_PRIVATE_KEY_PATH = os.getenv(\"SFTP_PRIVATE_KEY_PATH\")\n\nREMOTE_FOLDER = \"/daily/transactions/\"\nFILE_PATTERN = \"TXN_YYYYMMDD.csv\"\nFILE_NAME = FILE_PATTERN.replace(\"YYYYMMDD\", os.getenv(\"INGESTION_DATE\", \"\"))\nif not FILE_NAME or \"YYYYMMDD\" in FILE_NAME:\n    from datetime import datetime\n    FILE_NAME = FILE_PATTERN.replace(\"YYYYMMDD\", datetime.utcnow().strftime(\"%Y%m%d\"))\n\nREMOTE_PATH = REMOTE_FOLDER.rstrip(\"/\") + \"/\" + FILE_NAME\nLOCAL_DIR = Path(os.getenv(\"SFTP_LOCAL_DIR\", f\"/dbfs/tmp/athena_sftp/{RUN_ID}\"))\nLOCAL_DIR.mkdir(parents=True, exist_ok=True)\nLOCAL_PATH = LOCAL_DIR / FILE_NAME\nSPARK_CSV_PATH = str(LOCAL_PATH)\nif SPARK_CSV_PATH.startswith(\"/dbfs/\"):\n    SPARK_CSV_PATH = \"dbfs:/\" + SPARK_CSV_PATH[len(\"/dbfs/\"):]\n\nTARGET_TABLE = \"bronze.bronze_transaction\"\nMANDATORY_COLUMNS = ['transaction_id', 'transaction_date', 'amount']\nEXPECTED_ROW_COUNT = None\nEXPECTED_CHECKSUM = os.getenv(\"EXPECTED_CHECKSUM\", None)\nCHECKSUM_ALGORITHM = \"sha256\"\n\ndef _open_sftp():\n    transport = paramiko.Transport((SFTP_HOST, SFTP_PORT))\n    if SFTP_PRIVATE_KEY_PATH:\n        key = paramiko.RSAKey.from_private_key_file(SFTP_PRIVATE_KEY_PATH)\n        transport.connect(username=SFTP_USERNAME, pkey=key)\n    else:\n        if not SFTP_PASSWORD:\n            raise ValueError(\"Set SFTP_PASSWORD or SFTP_PRIVATE_KEY_PATH.\")\n        transport.connect(username=SFTP_USERNAME, password=SFTP_PASSWORD)\n    return transport, paramiko.SFTPClient.from_transport(transport)\n\ndef _file_checksum(path):\n    digest = hashlib.new(CHECKSUM_ALGORITHM)\n    with open(path, \"rb\") as handle:\n        for chunk in iter(lambda: handle.read(1024 * 1024), b\"\"):\n            digest.update(chunk)\n    return digest.hexdigest()\n\ntransport, sftp = _open_sftp()\ntry:\n    sftp.get(REMOTE_PATH, str(LOCAL_PATH))\nfinally:\n    sftp.close()\n    transport.close()\n\nactual_checksum = _file_checksum(LOCAL_PATH)\nif EXPECTED_CHECKSUM and actual_checksum.lower() != EXPECTED_CHECKSUM.lower():\n    raise ValueError(\n        f\"Checksum mismatch for {REMOTE_PATH}: expected={EXPECTED_CHECKSUM}, actual={actual_checksum}\"\n    )\n\ndf = (\n    spark.read\n    .option(\"header\", \"true\")\n    .option(\"inferSchema\", \"true\")\n    .csv(SPARK_CSV_PATH)\n)\n\nnormalized_columns = [column.strip().lower() for column in df.columns]\ndf = df.toDF(*normalized_columns)\n\nmissing_columns = [column.lower() for column in MANDATORY_COLUMNS if column.lower() not in df.columns]\nif missing_columns:\n    raise ValueError(f\"Missing mandatory columns in {REMOTE_PATH}: {missing_columns}\")\n\nactual_row_count = df.count()\nif EXPECTED_ROW_COUNT is not None and actual_row_count != EXPECTED_ROW_COUNT:\n    raise ValueError(\n        f\"Row count mismatch for {REMOTE_PATH}: expected={EXPECTED_ROW_COUNT}, actual={actual_row_count}\"\n    )\n\ndf = (\n    df\n    .withColumn(\"run_id\", lit(RUN_ID))\n    .withColumn(\"ingestion_timestamp\", current_timestamp())\n    .withColumn(\"source_system\", lit(\"Vendor SFTP\"))\n    .withColumn(\"source_folder\", lit(REMOTE_FOLDER))\n    .withColumn(\"source_file\", input_file_name())\n    .withColumn(\"source_checksum\", lit(actual_checksum))\n    .withColumn(\"source_row_count\", lit(actual_row_count))\n)\n\n(\n    df.write\n    .format(\"delta\")\n    .mode(\"append\")\n    .option(\"mergeSchema\", \"true\")\n    .saveAsTable(TARGET_TABLE)\n)\n\nprint(f\"SUCCESS: SFTP Bronze ingestion completed for {TARGET_TABLE} from {REMOTE_PATH}\")\n", "status": "APPROVED"}];
    const list = document.getElementById("list");
    const empty = document.getElementById("empty");
    const search = document.getElementById("search");
    const status = document.getElementById("status");

    function render() {
      const query = search.value.trim().toLowerCase();
      const selectedStatus = status.value;
      const filtered = rows.filter((row) => {
        const haystack = [row.source, row.target, row.script_name].join(" ").toLowerCase();
        const queryMatch = !query || haystack.includes(query);
        const statusMatch = !selectedStatus || row.status === selectedStatus;
        return queryMatch && statusMatch;
      });

      list.innerHTML = filtered.map((row) => `
        <article class="card">
          <div class="row">
            <div>
              <p class="source">${row.source}</p>
              <p class="target">Target: ${row.target}</p>
            </div>
            <span class="tag">${row.status}</span>
          </div>
          <pre style="margin:0; overflow:auto; background:#fffdf9; border:1px solid var(--line); border-radius:14px; padding:16px; font-size:13px; line-height:1.5;"><code>${escapeHtml(row.script_body)}</code></pre>
        </article>
      `).join("");

      empty.style.display = filtered.length ? "none" : "block";
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    search.addEventListener("input", render);
    status.addEventListener("change", render);
    render();
  </script>
</body>
</html>
